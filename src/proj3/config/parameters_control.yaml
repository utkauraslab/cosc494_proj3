# Parameters for your controller

control_node:
  ros__parameters:

    type: pid

    frequency: 50.0
    finish_threshold: 0.3
    exceed_threshold: 4.0
    distance_lookahead: 0.6
    min_speed: 0.5
    car_length: 0.33

    pid:
      kp: 0.8
      kd: 0.5
    pp:
      distance_lookahead: 0.1
      car_length: 0.33
    mpc:
      K: 2
      T: 1
      car_width: 0.15
      collision_w: 100000.0
      error_w: 1.0
      min_delta: -0.34
      max_delta: 0.34

    motion_params:
      vel_std: 0.0
      delta_std: 0.0
      x_std: 0.0
      y_std: 0.0
      theta_std: 0.0